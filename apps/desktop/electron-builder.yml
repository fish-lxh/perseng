appId: ai.deepractice.perseng.desktop
productName: Perseng
artifactName: perseng-desktop-${version}-${os}-${arch}.${ext}

directories:
  output: release
  buildResources: assets

files:
  - "out/**/*"
  - "assets/**/*"
  - "package.json"
  - "!**/*.map"
  - "!out/tests/**"
  - "!**/*.test.*"
  - "!**/node_modules/*/{README,readme,readme.md,readme.markdown,CHANGELOG,changelog,changelog.md,CHANGE,change,test,example,examples}"
  - "!**/node_modules/*/{.editorconfig,.eslintrc,.jshintrc,.npmignore}"
  - "!**/node_modules/**/*.ts"
  - "!**/node_modules/**/*.tsx"
  - "!**/node_modules/**/*.map"
  - "!**/node_modules/**/*.d.ts"
  - "!**/node_modules/.bin"
  - "!**/{test,__tests__,tests,testing}"
  - "!**/{example,examples,docs,doc}"
  - "!**/*.{md,MD,markdown,txt}"
  - "node_modules/@promptx/resource/dist/resources/**/*"
  # Re-include .md files for system roles (overrides the above exclusion)
  - "node_modules/@promptx/resource/dist/resources/**/*.md"

extraResources:
  - from: "../../packages/mcp-office/dist"
    to: "mcp-office"
    filter:
      - "**/*"
  - from: "../../packages/mcp-workspace/dist"
    to: "mcp-workspace"
    filter:
      - "**/*"

mac:
  category: public.app-category.developer-tools
  icon: assets/icons/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  artifactName: perseng-desktop-${version}-mac-${arch}.${ext}
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

win:
  # KNUTH-FIX 2026-07-09: 用预生成的多分辨率 icon.ico（7 个尺寸：16/24/32/48/64/128/256，
  # Vista+ PNG-encoded entries）。原配置指向 icon.png 时 electron-builder 26 的 PNG→ICO
  # 转换仅产出单个 256x256 条目，Windows 缩放到 16x16 任务栏/标题栏时出现"小图标不完整"。
  icon: assets/icons/icon.ico
  artifactName: perseng-desktop-${version}-win32-${arch}.${ext}
  requestedExecutionLevel: asInvoker
  target:
    - nsis

portable:
  artifactName: perseng-desktop-${version}-${os}-${arch}-portable.${ext}

linux:
  icon: assets/icons
  category: Development
  maintainer: Deepractice AI <sean@deepracticex.com>
  description: Perseng - AI Context Platform based on MCP protocol
  synopsis: Local AI prompt management application
  target:
    - target: deb
      arch: [x64, arm64]
    - target: AppImage
      arch: [x64, arm64]
    - target: rpm
      arch: [x64, arm64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ${productName}
  artifactName: perseng-desktop-${version}-win32-${arch}-setup.${ext}
  # KNUTH-FIX 2026-07-09: 显式指定 installer/uninstaller 图标，避免 electron-builder 默认
  # 用通用 Electron 图标（导致用户从下载目录/Downloads 看到的安装器 EXE 图标与品牌不符）。
  installerIcon: assets/icons/icon.ico
  uninstallerIcon: assets/icons/icon.ico

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

npmRebuild: true

# KNUTH-FIX 2026-07-05: 当前网络环境下 app-builder.exe 走代理下载必失败
# (proxyconnect tcp: dial tcp :0)。改用 electronDist 直接指向本地已缓存的
# electron zip，跳过下载阶段。
#
# KNUTH-FIX 2026-07-06: 上一版用 ${env.ELECTRON_DIST} 占位符，electron-builder 26
# 不解析这种 yml 字面量 —— 设了 env 还是字面量路径，build 报
# "The specified electronDist does not exist: ${env.ELECTRON_DIST}"。
# 实际 Cache/electron/v39.8.10/electron-v39.8.10-win32-x64.zip 已存在，
# builder 默认会找这个路径。删掉 electronDist 字段即可走默认 cache。
# 详见 docs/desktop-binary-build.md（4 件套绕过 GitHub 下载）。
# electronDist: <disabled — 用默认 cache>

# 生成更新元数据文件
generateUpdatesFilesForAllChannels: true

# 发布配置
# 优先级顺序:Perseng CDN (优先) → GitHub (兜底)
publish:
  - provider: generic
    url: https://perseng.deepractice.ai/download/latest
  - provider: github
    owner: Deepractice
    repo: Perseng
    releaseType: release
